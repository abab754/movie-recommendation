services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - rec-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - rec-network

  postgres:
    image: postgres:15
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rec_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rec_pass}
      POSTGRES_DB: ${POSTGRES_DB:-recommendations}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rec_user -d recommendations"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - rec-network

  producer:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    command: python -m pipeline.producer
    restart: on-failure
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_INTERACTIONS_TOPIC: user-interactions
      PRODUCER_DELAY_MS: ${PRODUCER_DELAY_MS:-100}
      RATINGS_FILE: /app/data/ml-1m/ratings.dat
    volumes:
      - ./data:/app/data
    networks:
      - rec-network

  consumer:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    command: python -m pipeline.consumer
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_INTERACTIONS_TOPIC: user-interactions
      KAFKA_TRIGGER_TOPIC: model-triggers
      RETRAIN_THRESHOLD: ${RETRAIN_THRESHOLD:-10000}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-recommendations}
      POSTGRES_USER: ${POSTGRES_USER:-rec_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rec_pass}
    networks:
      - rec-network

  trainer:
    build:
      context: .
      dockerfile: model/Dockerfile
    command: python -m model.retrain_scheduler
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TRIGGER_TOPIC: model-triggers
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-recommendations}
      POSTGRES_USER: ${POSTGRES_USER:-rec_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rec_pass}
      MODEL_STORE_PATH: /app/model_store
      RATINGS_FILE: /app/data/ml-1m/ratings.dat
    volumes:
      - ./data:/app/data
      - model-store:/app/model_store
    networks:
      - rec-network

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_INTERACTIONS_TOPIC: user-interactions
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-recommendations}
      POSTGRES_USER: ${POSTGRES_USER:-rec_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rec_pass}
      MODEL_STORE_PATH: /app/model_store
      MOVIES_FILE: /app/data/ml-1m/movies.dat
    volumes:
      - ./data:/app/data
      - model-store:/app/model_store
    networks:
      - rec-network

  monitoring:
    build:
      context: .
      dockerfile: monitoring/Dockerfile
    ports:
      - "8501:8501"
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-recommendations}
      POSTGRES_USER: ${POSTGRES_USER:-rec_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rec_pass}
      API_URL: http://api:8000
    networks:
      - rec-network

volumes:
  postgres-data:
  model-store:

networks:
  rec-network:
    driver: bridge
